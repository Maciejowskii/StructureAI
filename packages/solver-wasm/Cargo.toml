[package]
name = "solver-wasm"
version = "0.1.0"
edition = "2021"
description = "StructurAI Dynamics - MES Solver Engine compiled to WebAssembly"
authors = ["StructurAI Team"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
nalgebra = "0.33"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"       # Optimize for size (faster WASM download)
lto = true            # Link-time optimization
